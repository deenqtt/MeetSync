name: Build & Push Docker Image

on:
  push:
    branches: [main]

permissions:
  contents: write   # create GitHub Release
  packages: write   # push ke GHCR

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/gspetech/meetsync

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Generate version tag ────────────────────────────────────
      - name: Set version
        run: |
          VERSION=$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ── 3. Docker Buildx (multi-platform support) ──────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Login ke GHCR ──────────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Build & push image ──────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:v${{ env.VERSION }}

      # ── 6. GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MeetSync v${{ env.VERSION }}
          generate_release_notes: true
          body: |
            ### Docker Image
            ```
            ghcr.io/gspetech/meetsync:v${{ env.VERSION }}
            ghcr.io/gspetech/meetsync:latest
            ```

            ### Deploy ke server
            ```bash
            docker compose pull
            docker compose up -d
            ```
