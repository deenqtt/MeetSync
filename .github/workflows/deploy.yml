name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write  # for creating GitHub Releases

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node + npm cache ────────────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. Install ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Prisma generate ─────────────────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate

      # ── 5. Type check ──────────────────────────────────────────────
      - name: Type check
        run: npx tsc --noEmit

      # ── 6. Build (Next.js standalone) ──────────────────────────────
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── 7. Package artifact ────────────────────────────────────────
      # standalone = self-contained server.js + minimal node_modules
      # We add: .next/static (public assets), public/, prisma/ (migrations)
      - name: Package build artifact
        run: |
          VERSION=$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          mkdir -p dist/app
          cp -r .next/standalone/. dist/app/
          cp -r .next/static      dist/app/.next/static
          cp -r public            dist/app/public
          cp -r prisma            dist/app/prisma

          tar -czf meetsync-${VERSION}.tar.gz -C dist app
          echo "ARTIFACT=meetsync-${VERSION}.tar.gz" >> $GITHUB_ENV

      # ── 8. GitHub Release (artifact sebagai attachment) ─────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MeetSync v${{ env.VERSION }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT }}

      # ── 9. SCP artifact ke server ──────────────────────────────────
      - name: Copy artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: ${{ env.ARTIFACT }}
          target: /home/gspe/meetsync/releases/

      # ── 10. Deploy di server ───────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: VERSION,ARTIFACT
          script: |
            set -e
            DEPLOY_DIR="/home/gspe/meetsync"
            RELEASE="$DEPLOY_DIR/releases/$ARTIFACT"

            echo "▶ Extracting $ARTIFACT..."
            tar -xzf "$RELEASE" -C "$DEPLOY_DIR/releases/"
            rm "$RELEASE"

            echo "▶ Swapping build..."
            pm2 stop meetsync 2>/dev/null || true
            rm -rf "$DEPLOY_DIR/app.bak"
            mv "$DEPLOY_DIR/app" "$DEPLOY_DIR/app.bak" 2>/dev/null || true
            mv "$DEPLOY_DIR/releases/app" "$DEPLOY_DIR/app"

            echo "▶ Copying .env..."
            cp "$DEPLOY_DIR/.env" "$DEPLOY_DIR/app/.env"

            echo "▶ Running DB migrations..."
            cd "$DEPLOY_DIR/app"
            set -a; source .env; set +a
            npx prisma migrate deploy

            echo "▶ Starting app..."
            cd "$DEPLOY_DIR"
            pm2 start ecosystem.config.js 2>/dev/null || pm2 restart meetsync
            pm2 save

            echo "✅ Deploy selesai — v$VERSION"
